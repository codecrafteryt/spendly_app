name: spendly_app
description: Spendly - personalized spending habits quiz and report.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.2
  get_storage: ^2.1.1
  google_fonts: ^6.2.1
  firebase_core: ^3.13.0
  cloud_functions: ^5.3.4
  cloud_firestore: ^5.6.7
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5
  flutter_stripe: ^11.5.0
  webview_flutter: ^4.10.0
  crypto: ^3.0.6
  uuid: ^4.5.1
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
